name: Java Build Pipeline

on:
  push:
    branches:
      - main

jobs:
  setup-environment:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code into the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # A popular open-source Java distribution
          
      # Step 3: Prove it worked!
      - name: Verify Java Installation
        run: java -version