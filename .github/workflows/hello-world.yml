name: Java Build Pipeline

on:
  push:
    branches:
      - main

jobs:
  setup-environment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Java Files
        run: |
          mkdir -p bin
          javac -cp "lib/*" -d bin $(find src -name "*.java")

      - name: Inject and Test Database Password
        env:
          MY_DATABASE_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: echo "Successfully loaded password into secure environment."

      # Step 6: Save the compiled code! (NEW!)
      - name: Upload Compiled App as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bank-management-compiled-app
          path: |
            bin/
            lib/